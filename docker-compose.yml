services:
  postgres:
    image: postgres:16-alpine
    container_name: openseo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openseo}
      POSTGRES_USER: ${POSTGRES_USER:-openseo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openseo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openseo} -d ${POSTGRES_DB:-openseo}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openseo-backend-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://openseo:openseo@postgres:5432/openseo}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_PROVIDER_MAX_RETRIES: ${LLM_PROVIDER_MAX_RETRIES:-1}
      LLM_CALL_MAX_RETRIES: ${LLM_CALL_MAX_RETRIES:-2}
      LLM_CALL_RETRY_INITIAL_SECONDS: ${LLM_CALL_RETRY_INITIAL_SECONDS:-1.0}
      LLM_CALL_RETRY_MAX_SECONDS: ${LLM_CALL_RETRY_MAX_SECONDS:-16.0}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-4}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-2}
      JOB_RETRY_INITIAL_SECONDS: ${JOB_RETRY_INITIAL_SECONDS:-60}
      JOB_RETRY_MAX_SECONDS: ${JOB_RETRY_MAX_SECONDS:-900}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      SLO_SCRAPE_SUCCESS_TARGET: ${SLO_SCRAPE_SUCCESS_TARGET:-99.5}
      SLO_JOB_SUCCESS_TARGET: ${SLO_JOB_SUCCESS_TARGET:-99.0}
      SLO_P95_MINUTES_TARGET: ${SLO_P95_MINUTES_TARGET:-15}
      WORKER_STALE_SECONDS: ${WORKER_STALE_SECONDS:-90}
      STALE_RUNNING_SECONDS: ${STALE_RUNNING_SECONDS:-1800}
      WORKER_HEARTBEAT_ENABLED: ${WORKER_HEARTBEAT_ENABLED:-true}
      STEALTHY_FETCH_MAX_CONCURRENCY: ${STEALTHY_FETCH_MAX_CONCURRENCY:-2}
      COMPETITOR_SCRAPE_MAX_WORKERS: ${COMPETITOR_SCRAPE_MAX_WORKERS:-4}
      SCRAPE_CASCADE_FAIL_MIN_SAMPLES: ${SCRAPE_CASCADE_FAIL_MIN_SAMPLES:-4}
      SCRAPE_CASCADE_FAIL_RATIO: ${SCRAPE_CASCADE_FAIL_RATIO:-0.9}
      EMBEDDED_WORKER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openseo-worker
    command:
      [
        "python",
        "worker.py",
        "--poll-seconds",
        "2",
        "--schedule-check-seconds",
        "30",
        "--heartbeat-seconds",
        "15",
        "--stale-running-seconds",
        "${STALE_RUNNING_SECONDS:-1800}",
        "--recovery-check-seconds",
        "60",
        "--claim-batch-size",
        "${WORKER_CLAIM_BATCH_SIZE:-2}"
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://openseo:openseo@postgres:5432/openseo}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_PROVIDER_MAX_RETRIES: ${LLM_PROVIDER_MAX_RETRIES:-1}
      LLM_CALL_MAX_RETRIES: ${LLM_CALL_MAX_RETRIES:-2}
      LLM_CALL_RETRY_INITIAL_SECONDS: ${LLM_CALL_RETRY_INITIAL_SECONDS:-1.0}
      LLM_CALL_RETRY_MAX_SECONDS: ${LLM_CALL_RETRY_MAX_SECONDS:-16.0}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-4}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-2}
      JOB_RETRY_INITIAL_SECONDS: ${JOB_RETRY_INITIAL_SECONDS:-60}
      JOB_RETRY_MAX_SECONDS: ${JOB_RETRY_MAX_SECONDS:-900}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      WORKER_STALE_SECONDS: ${WORKER_STALE_SECONDS:-90}
      STALE_RUNNING_SECONDS: ${STALE_RUNNING_SECONDS:-1800}
      WORKER_HEARTBEAT_ENABLED: ${WORKER_HEARTBEAT_ENABLED:-true}
      STEALTHY_FETCH_MAX_CONCURRENCY: ${STEALTHY_FETCH_MAX_CONCURRENCY:-2}
      COMPETITOR_SCRAPE_MAX_WORKERS: ${COMPETITOR_SCRAPE_MAX_WORKERS:-4}
      SCRAPE_CASCADE_FAIL_MIN_SAMPLES: ${SCRAPE_CASCADE_FAIL_MIN_SAMPLES:-4}
      SCRAPE_CASCADE_FAIL_RATIO: ${SCRAPE_CASCADE_FAIL_RATIO:-0.9}
    depends_on:
      postgres:
        condition: service_healthy
      backend-api:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openseo-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend-api:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
